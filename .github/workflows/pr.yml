name: PR Tests
on:
  pull_request:

permissions:
  contents: read

jobs:
  coverage-goshujin:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: goshujin
          persist-credentials: false

      - name: "Install Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: "Install pnpm"
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10

      - name: "Run Test with Coverage"
        run: |
          pnpm install --frozen-lockfile
          pnpm build:frontend
          pnpm coverage --testTimeout 15000

      - name: "Upload Coverage"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-goshujin
          path: coverage

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.ref }}
          persist-credentials: false

      - name: "Install Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: "Install pnpm"
        uses: pnpm/action-setup@8912a9102ac27614460f54aedde9e1e7f9aec20d # v6.0.5
        with:
          version: 10

      - name: "Install Deps"
        run: pnpm install --frozen-lockfile

      - name: "Build Frontend"
        run: pnpm build:frontend

      - name: "Lint"
        run: |
          pnpm prettier -c .
          pnpm lint

      - name: "Type Check"
        run: pnpm typecheck

      - name: "Run Test with Coverage"
        run: pnpm coverage --testTimeout 15000

      - name: "Upload Coverage"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-head
          path: coverage

  report-coverage:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Download HEAD coverage artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-head
          path: coverage

      - name: "Download goshujin coverage artifacts"
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: coverage-goshujin
          path: coverage-goshujin

      - name: "Report Coverage"
        uses: davelosert/vitest-coverage-report-action@3c50566c523e04813df28de8f7c48dd97d663f1c # v2.11.2
        with:
          json-summary-compare-path: coverage-goshujin/coverage-summary.json
