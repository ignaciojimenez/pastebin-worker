name = "pb"
compatibility_date = "2025-04-24"

workers_dev = false
main = "worker/index.ts"

[[rules]]
type = "Text"
globs = [ "**/*.html", "**/*.md", "**/*.css" ]
fallthrough = true

[assets]
directory = "dist/frontend"
run_worker_first = true
binding = "ASSETS"

[triggers]
# clean r2 garbage every day
crons = ["0 0 * * *"]

[observability]
# enable to collect logs
enabled = true

#----------------------------------------
# lines below are what you should modify
#----------------------------------------

[[routes]]
# Refer to https://developers.cloudflare.com/workers/wrangler/configuration/#routes
pattern = "curlbin.ignacio.systems"
custom_domain = true

[[kv_namespaces]]
binding = "PB"  # do not touch this
id = "cc5a099a576e403f90d41bc6b9dac768"  # id of your KV namespace

[[r2_buckets]]
binding = "R2"  # do not touch this
bucket_name = "backups"  # bucket name of your R2 bucket

[vars]
# must be consistent with your routes
DEPLOY_URL = "https://curlbin.ignacio.systems"

# url to repo, displayed in the index page
REPO = "https://github.com/ignaciojimenez/pastebin-worker"

# the page title displayed in index page
INDEX_PAGE_TITLE = "Pastebin Worker"

# the name displayed in TOS
TOS_MAINTAINER = "Ignacio"

# the email displayed in TOS
TOS_MAIL = "me@"

# Cache-Control max-age for static pages
CACHE_STATIC_PAGE_AGE = 7200

# Cache-Control max-age for paste pages
CACHE_PASTE_AGE = 600

# Default expiration
DEFAULT_EXPIRATION = "180d"

# Max expiration
MAX_EXPIRATION = "365d"

# A collection of {username: password} pair
# Leave empty to disable auth
BASIC_AUTH = {}

# Files larger than this threshold will be stored in R2
R2_THRESHOLD = "20K"

# File larger than this will be denied
R2_MAX_ALLOWED = "200M"

# The following mimetypes will be converted to text/plain
DISALLOWED_MIME_FOR_PASTE = ["text/html", "audio/x-mpegurl"]

# Set to true for API-only mode: disables upload UI, URL redirects, and article rendering
HEADLESS_MODE = true

#----------------------------------------
# Dev preview environment
#----------------------------------------

[env.dev]
workers_dev = true
name = "pb-dev"
routes = []  # no custom domain — workers.dev URL only

[[env.dev.kv_namespaces]]
binding = "PB"
id = "c15d47225a904c638793c10b37c0a2ac"  # run: wrangler kv namespace create PB --env dev

[[env.dev.r2_buckets]]
binding = "R2"
bucket_name = "backups-dev"  # run: wrangler r2 bucket create backups-dev

[env.dev.vars]
DEPLOY_URL = "https://pb-dev.i-jimenezpi.workers.dev"
REPO = "https://github.com/ignaciojimenez/pastebin-worker"
INDEX_PAGE_TITLE = "Pastebin Worker (Dev)"
TOS_MAINTAINER = "Ignacio"
TOS_MAIL = "me@"
CACHE_STATIC_PAGE_AGE = 0
CACHE_PASTE_AGE = 0
DEFAULT_EXPIRATION = "1d"
MAX_EXPIRATION = "7d"
BASIC_AUTH = {}
R2_THRESHOLD = "100K"
R2_MAX_ALLOWED = "200M"
DISALLOWED_MIME_FOR_PASTE = ["text/html", "audio/x-mpegurl"]
HEADLESS_MODE = true
